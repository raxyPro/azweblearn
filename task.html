<!DOCTYPE html>
<html>
<head>
  <title>Talk Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Talk Manager</h1>

  <div class="card">
    <input id="person" placeholder="Person Name">
    <input id="topic" placeholder="Talk Topic">
    <input id="date" type="date">
    <select id="status">
      <option>Open</option>
      <option>Pending</option>
      <option>Closed</option>
    </select>
    <textarea id="notes" placeholder="Notes"></textarea>
    <button onclick="addTalk()">Add Talk</button>
  </div>

  <h2>My Talks</h2>
  <input id="search" placeholder="Search..." onkeyup="renderTalks()">

  <div id="talkList"></div>

  <script src="app.js"></script>
</body>
</html>
